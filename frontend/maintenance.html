<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - Aura Gifts</title>
    <link rel="icon" href="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717074/aura-gifts/logos/hky5k3sgrupvx5jtxqrh.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717074/aura-gifts/logos/hky5k3sgrupvx5jtxqrh.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --off-white:  #f8f8f6;
            --gold:       #e8e0d0;
            --gold-dark:  #b8a898;
            --text-dark:  #1a1a1a;
            --text-light: #7a7a7a;
            --border:     #e0d8cc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--off-white);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .brand {
            font-family: 'Avenir Next', 'Avenir', 'Nunito', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.5px;
            margin-bottom: 48px;
        }
        .brand span:first-child { font-weight: 800; color: #787878; }
        .brand span:last-child  { font-weight: 400; color: #787878; }
        .icon {
            width: 72px; height: 72px;
            background: var(--gold);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 28px;
            font-size: 1.8rem;
            color: var(--gold-dark);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-dark);
        }
        p {
            color: var(--text-light);
            font-size: 1rem;
            max-width: 420px;
            line-height: 1.7;
            margin-bottom: 36px;
        }
        .contact {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .contact a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gold-dark);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .contact a:hover { color: var(--text-dark); }
        .divider {
            width: 40px; height: 2px;
            background: var(--gold);
            margin: 32px auto;
            border-radius: 2px;
        }
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .brand { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="brand"><span>aura</span><span>gifts</span></div>

    <div class="icon"><i class="fas fa-tools"></i></div>

    <h1>We'll Be Back Soon</h1>
    <p>We're currently performing some maintenance to improve your experience. We'll be back shortly. Thank you for your patience.</p>

    <div class="divider"></div>

    <div class="contact">
        <a href="mailto:aura.gifts.mv@gmail.com"><i class="fas fa-envelope"></i> aura.gifts.mv@gmail.com</a>
        <a href="tel:9992070"><i class="fas fa-phone"></i> 9992070</a>
        <a href="https://www.instagram.com/auragifts.mv/" target="_blank"><i class="fab fa-instagram"></i> auragifts.mv</a>
    </div>
</body>
</html>
