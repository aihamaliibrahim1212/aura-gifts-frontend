    <div class="main-wrap">
      <header class="topbar">
        <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <h2 class="page-title">Reviews</h2>
        <div class="topbar-right">
          <span class="admin-name" id="adminName">...</span>
          <button class="btn btn-primary btn-sm" onclick="openAddReviewModal()">+ Add Review</button>
          <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
        </div>
      </header>

      <main class="content">
        <div class="card">
          <div class="card-header">
            <h3>All Reviews</h3>
          </div>
          <div id="reviewsList">
            <div class="empty-state"><p>Loading…</p></div>
          </div>
        </div>
      </main>

  <!-- Add / Edit Review Modal -->
  <div id="reviewModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="reviewModalTitle">Add Review</h3>
        <button class="modal-close" onclick="closeReviewModal()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="reviewId" />

        <div class="form-row">
          <div class="form-group">
            <label>Reviewer Name *</label>
            <input type="text" id="rName" class="form-control" required />
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="rLocation" class="form-control" placeholder="e.g. Malé, Maldives" />
          </div>
        </div>

        <div class="form-group">
          <label>Rating *</label>
          <div class="star-picker" id="starPicker">
            <span class="star" data-val="1" onclick="setRating(1)">★</span>
            <span class="star" data-val="2" onclick="setRating(2)">★</span>
            <span class="star" data-val="3" onclick="setRating(3)">★</span>
            <span class="star" data-val="4" onclick="setRating(4)">★</span>
            <span class="star" data-val="5" onclick="setRating(5)">★</span>
          </div>
          <input type="hidden" id="rRating" value="5" />
        </div>

        <div class="form-group">
          <label>Review Text *</label>
          <textarea id="rText" class="form-control" rows="4" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeReviewModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveReview()">Save Review</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/admin/static/admin.js?v=5"></script>
  <script>window.scrollTo(0, 0);</script>
  <script>
    requireAuth();
    let allReviews = [];

    async function loadReviews() {
      try {
        allReviews = await api('/api/admin/reviews');
        renderReviews(allReviews);
      } catch (e) {
        showToast('Failed to load reviews', 'error');
      }
    }

    function starsHtml(rating) {
      return '★'.repeat(rating) + '☆'.repeat(5 - rating);
    }

    function renderReviews(reviews) {
      const container = document.getElementById('reviewsList');
      if (!reviews.length) {
        container.innerHTML = '<div class="empty-state"><p>No reviews yet. Add one above.</p></div>';
        return;
      }
      container.innerHTML = reviews.map(r => `
        <div class="review-item">
          <div class="review-meta">
            <strong>${escHtml(r.reviewer_name)}</strong>
            ${r.reviewer_location ? `<span class="text-muted" style="font-size:0.8rem;">${escHtml(r.reviewer_location)}</span>` : ''}
            <span class="stars">${starsHtml(r.rating)}</span>
            <span class="text-muted" style="font-size:0.75rem;margin-left:auto;">${formatDate(r.created_at)}</span>
          </div>
          <p style="font-size:0.875rem;color:var(--text-mid);margin-top:6px;">${r.text}</p>
          <div class="d-flex gap-8 mt-16">
            <button class="btn btn-outline btn-sm" onclick="editReview(${r.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteReview(${r.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function setRating(val) {
      document.getElementById('rRating').value = val;
      document.querySelectorAll('#starPicker .star').forEach(s => {
        s.classList.toggle('active', parseInt(s.dataset.val) <= val);
      });
    }

    function openAddReviewModal() {
      document.getElementById('reviewModalTitle').textContent = 'Add Review';
      document.getElementById('reviewId').value = '';
      document.getElementById('rName').value = '';
      document.getElementById('rLocation').value = '';
      document.getElementById('rText').value = '';
      setRating(5);
      document.getElementById('reviewModal').classList.add('open');
    }

    function editReview(id) {
      const r = allReviews.find(r => r.id === id);
      if (!r) return;
      document.getElementById('reviewModalTitle').textContent = 'Edit Review';
      document.getElementById('reviewId').value = r.id;
      document.getElementById('rName').value = r.reviewer_name;
      document.getElementById('rLocation').value = r.reviewer_location || '';
      document.getElementById('rText').value = r.text;
      setRating(r.rating);
      document.getElementById('reviewModal').classList.add('open');
    }

    function closeReviewModal() {
      document.getElementById('reviewModal').classList.remove('open');
    }

    async function saveReview() {
      const id = document.getElementById('reviewId').value;
      const payload = {
        reviewer_name: document.getElementById('rName').value.trim(),
        reviewer_location: document.getElementById('rLocation').value.trim(),
        rating: parseInt(document.getElementById('rRating').value, 10),
        text: document.getElementById('rText').value.trim(),
        is_approved: true
      };

      if (!payload.reviewer_name || !payload.text) {
        showToast('Name and review text are required', 'error');
        return;
      }

      try {
        if (id) {
          await api(`/api/admin/reviews/${id}`, 'PUT', payload);
          showToast('Review updated', 'success');
        } else {
          await api('/api/admin/reviews', 'POST', payload);
          showToast('Review added', 'success');
        }
        invalidateFrontendCache();
        closeReviewModal();
        loadReviews();
      } catch (e) {
        showToast(e.message || 'Failed to save review', 'error');
      }
    }

    async function deleteReview(id) {
      showConfirm('Delete this review? This cannot be undone.', async () => {
        try {
          await api(`/api/admin/reviews/${id}`, 'DELETE');
          invalidateFrontendCache();
          showToast('Review deleted', 'success');
          loadReviews();
        } catch (e) {
          showToast('Failed to delete review', 'error');
        }
      });
    }

    setRating(5);
    loadReviews();
  </script>
