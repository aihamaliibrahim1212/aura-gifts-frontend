    <div class="main-wrap">
      <header class="topbar">
        <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>

        <div class="topbar-right">

          <a href="/pages/faq.html" target="_blank" class="btn btn-outline btn-sm"><i class="fas fa-external-link-alt"></i> View Page</a>
          <button class="btn btn-primary btn-sm" onclick="openFaqModal()">+ Add FAQ</button>
          <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
        </div>
      </header>

      <main class="content">
        <div class="card">
          <div class="card-header">
            <h3>Frequently Asked Questions</h3>
            <span class="text-muted" style="font-size:0.8rem;">Use ↑ ↓ to reorder</span>
          </div>
          <div id="faqList">
            <div class="empty-state"><p>Loading…</p></div>
          </div>
        </div>

  <!-- FAQ Modal -->
  <div id="faqModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="faqModalTitle">Add FAQ</h3>
        <button class="modal-close" onclick="closeFaqModal()">✕</button>
      </div>
      <div class="modal-body" style="overflow-y:auto;overscroll-behavior:contain;">
        <input type="hidden" id="faqId" />

        <div class="form-group">
          <label>Question *</label>
          <input type="text" id="faqQuestion" class="form-control" required />
        </div>

        <div class="form-group">
          <label>Answer *</label>
          <textarea id="faqAnswer" class="form-control" rows="5" required></textarea>
        </div>

        <div class="form-group">
          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="faqActive" checked />
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label">Active, show on site</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeFaqModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveFaq()">Save FAQ</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/admin/static/admin.js?v=4"></script>
  <script>window.scrollTo(0, 0);</script>
  <script>
    requireAuth();
    let faqs = [];

    async function loadFaqs() {
      try {
        faqs = await api('/api/admin/faq');
        renderFaqs();
      } catch (e) {
        showToast('Failed to load FAQs', 'error');
      }
    }

    function renderFaqs() {
      const container = document.getElementById('faqList');
      if (!faqs.length) {
        container.innerHTML = '<div class="empty-state"><p>No FAQs yet. Add one above.</p></div>';
        return;
      }
      container.innerHTML = faqs.map((f, idx) => `
        <div class="faq-row">
          <div class="faq-order-btns">
            <button onclick="moveFaq(${idx}, -1)" ${idx === 0 ? 'disabled' : ''} title="Move up">↑</button>
            <button onclick="moveFaq(${idx}, 1)" ${idx === faqs.length - 1 ? 'disabled' : ''} title="Move down">↓</button>
          </div>
          <div class="faq-content">
            <strong>
              ${escHtml(f.question)}
              ${!f.is_active ? '<span class="badge badge-gray" style="margin-left:8px;">Inactive</span>' : ''}
            </strong>
            <p>${escHtml(f.answer.length > 140 ? f.answer.slice(0, 140) + '…' : f.answer)}</p>
          </div>
          <div class="d-flex gap-8">
            <button class="btn btn-outline btn-sm" onclick="editFaq(${f.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteFaq(${f.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function moveFaq(idx, direction) {
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= faqs.length) return;
      [faqs[idx], faqs[newIdx]] = [faqs[newIdx], faqs[idx]];
      const reorderData = faqs.map((f, i) => ({ id: f.id, sort_order: i }));
      try {
        faqs = await api('/api/admin/faq/reorder', 'POST', reorderData);
        invalidateFrontendCache();
        renderFaqs();
      } catch (e) {
        showToast('Failed to reorder FAQs', 'error');
        loadFaqs();
      }
    }

    function openFaqModal() {
      document.getElementById('faqModalTitle').textContent = 'Add FAQ';
      document.getElementById('faqId').value = '';
      document.getElementById('faqQuestion').value = '';
      document.getElementById('faqAnswer').value = '';
      document.getElementById('faqActive').checked = true;
      document.getElementById('faqModal').classList.add('open');
    }

    function editFaq(id) {
      const f = faqs.find(f => f.id === id);
      if (!f) return;
      document.getElementById('faqModalTitle').textContent = 'Edit FAQ';
      document.getElementById('faqId').value = f.id;
      document.getElementById('faqQuestion').value = f.question;
      document.getElementById('faqAnswer').value = f.answer;
      document.getElementById('faqActive').checked = f.is_active;
      document.getElementById('faqModal').classList.add('open');
    }

    function closeFaqModal() {
      document.getElementById('faqModal').classList.remove('open');
    }

    async function saveFaq() {
      const id = document.getElementById('faqId').value;
      const payload = {
        question: document.getElementById('faqQuestion').value.trim(),
        answer: document.getElementById('faqAnswer').value.trim(),
        is_active: document.getElementById('faqActive').checked
      };

      if (!payload.question || !payload.answer) {
        showToast('Question and answer are required', 'error');
        return;
      }

      try {
        if (id) {
          await api(`/api/admin/faq/${id}`, 'PUT', payload);
          showToast('FAQ updated', 'success');
        } else {
          await api('/api/admin/faq', 'POST', payload);
          showToast('FAQ created', 'success');
        }
        invalidateFrontendCache();
        closeFaqModal();
        loadFaqs();
      } catch (e) {
        showToast(e.message || 'Failed to save FAQ', 'error');
      }
    }

    async function deleteFaq(id) {
      showConfirm('Delete this FAQ? This cannot be undone.', async () => {
        try {
          await api(`/api/admin/faq/${id}`, 'DELETE');
          invalidateFrontendCache();
          showToast('FAQ deleted', 'success');
          loadFaqs();
        } catch (e) {
          showToast('Failed to delete FAQ', 'error');
        }
      });
    }

    loadFaqs();
  </script>
