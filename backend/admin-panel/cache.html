  <script src="/admin/static/admin.js"></script>
  <script>
    requireAuth();

    async function incrementCacheVersions() {
      const btn = document.getElementById('cacheBtn');
      const status = document.getElementById('cacheStatus');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Incrementing...';
      status.innerHTML = '';

      try {
        const res = await fetch('/api/admin/increment-cache-versions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getToken()
          }
        });

        const data = await res.json();

        if (data.success) {
          status.innerHTML = '<div style="color:green;"><strong>✓ Success!</strong> All versions incremented.</div>';
        } else {
          status.innerHTML = '<div style="color:red;"><strong>✗ Error:</strong> ' + (data.error || 'Failed') + '</div>';
        }
      } catch (err) {
        status.innerHTML = '<div style="color:red;"><strong>✗ Error:</strong> Could not connect</div>';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sync"></i> Increment All Versions';
      }
    }
  </script>
