    <div class="main-wrap">
      <header class="topbar">
        <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
        <h2 class="page-title">Cache Management</h2>
        <div class="topbar-right">
          <span class="admin-name" id="adminName">Admin</span>
          <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
        </div>
      </header>

      <main class="content">
        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-sync-alt"></i> Increment Cache Versions</h3>
          </div>
          <div style="padding:20px;">
            <p style="margin-bottom:16px;">Click to auto-increment all JavaScript and CSS version numbers:</p>
            <button class="btn btn-primary" onclick="incrementCacheVersions()" id="cacheBtn">
              <i class="fas fa-sync"></i> Increment All Versions
            </button>
            <div id="cacheStatus" style="margin-top:16px;"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/admin/static/admin.js"></script>
  <script>
    requireAuth();

    async function incrementCacheVersions() {
      const btn = document.getElementById('cacheBtn');
      const status = document.getElementById('cacheStatus');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Incrementing...';
      status.innerHTML = '';

      try {
        const res = await fetch('/api/admin/increment-cache-versions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getToken()
          }
        });

        const data = await res.json();

        if (data.success) {
          status.innerHTML = '<div style="color:green;"><strong>✓ Success!</strong> All versions incremented.</div>';
        } else {
          status.innerHTML = '<div style="color:red;"><strong>✗ Error:</strong> ' + (data.error || 'Failed') + '</div>';
        }
      } catch (err) {
        status.innerHTML = '<div style="color:red;"><strong>✗ Error:</strong> Could not connect</div>';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sync"></i> Increment All Versions';
      }
    }
  </script>
