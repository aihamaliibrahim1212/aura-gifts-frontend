      <main class="content">

        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-shield-alt" style="margin-right:6px;color:var(--gold-dark);"></i> Sections</h3>
            <button class="btn btn-primary btn-sm" onclick="addSection()"><i class="fas fa-plus"></i> Add Section</button>
          </div>
          <div id="sectionsList" style="padding:16px;display:flex;flex-direction:column;gap:16px;">
            <div class="empty-state"><p>Loading...</p></div>

  <div id="toast" class="toast"></div>
  <script src="/admin/static/admin.js?v=3"></script>
  <script>window.scrollTo(0, 0);</script>
  <script>
    requireAuth();
    const CONTENT_KEY = 'privacy_policy';
    let sections = [];

    async function loadContent() {
      try {
        const items = await api('/api/admin/content');
        const item = items.find(i => i.key === CONTENT_KEY);
        if (item && item.value) {
          try { sections = JSON.parse(item.value); } catch { sections = [{ heading: '', body: item.value }]; }
        } else {
          sections = [];
        }
        renderSections();
      } catch (e) {
        showToast('Failed to load content', 'error');
      }
    }

    function renderSections() {
      const list = document.getElementById('sectionsList');
      if (!sections.length) {
        list.innerHTML = '<div class="empty-state"><p>No sections yet. Click "Add Section" to get started.</p></div>';
        return;
      }
      list.innerHTML = sections.map((s, i) => `
        <div style="border:1.5px solid var(--border-gray);border-radius:10px;overflow:hidden;">
          <div style="background:var(--off-white);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--light-gray);">
            <div style="display:flex;flex-direction:column;gap:3px;">
              <button class="btn btn-outline btn-sm" style="padding:2px 7px;" onclick="moveSection(${i},-1)" ${i===0?'disabled':''}>↑</button>
              <button class="btn btn-outline btn-sm" style="padding:2px 7px;" onclick="moveSection(${i},1)" ${i===sections.length-1?'disabled':''}>↓</button>
            </div>
            <span style="font-size:0.78rem;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:0.5px;">Section ${i+1}</span>
            <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="removeSection(${i})"><i class="fas fa-trash"></i> Remove</button>
          </div>
          <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">
            <div class="form-group" style="margin:0;">
              <label class="section-label-admin">Heading</label>
              <input type="text" class="form-control sec-heading" data-idx="${i}" value="${escVal(s.heading)}" placeholder="e.g. Information We Collect" />
            </div>
            <div class="form-group" style="margin:0;">
              <label class="section-label-admin">Body Text</label>
              <textarea class="form-control sec-body" data-idx="${i}" rows="5" placeholder="Section content…">${escVal(s.body)}</textarea>
            </div>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.sec-heading').forEach(el => {
        el.addEventListener('input', () => { sections[el.dataset.idx].heading = el.value; });
      });
      document.querySelectorAll('.sec-body').forEach(el => {
        el.addEventListener('input', () => { sections[el.dataset.idx].body = el.value; });
      });
    }

    function escVal(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function addSection() {
      sections.push({ heading: '', body: '' });
      renderSections();
      document.getElementById('sectionsList').lastElementChild.scrollIntoView({ behavior: 'smooth' });
    }

    function removeSection(idx) {
      if (!confirm('Remove this section?')) return;
      sections.splice(idx, 1);
      renderSections();
    }

    function moveSection(idx, dir) {
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= sections.length) return;
      [sections[idx], sections[newIdx]] = [sections[newIdx], sections[idx]];
      renderSections();
    }

    async function saveAll() {
      document.querySelectorAll('.sec-heading').forEach(el => { sections[el.dataset.idx].heading = el.value; });
      document.querySelectorAll('.sec-body').forEach(el => { sections[el.dataset.idx].body = el.value; });
      try {
        await api('/api/admin/content', 'PUT', [{ key: CONTENT_KEY, value: JSON.stringify(sections), content_type: 'json' }]);
        invalidateFrontendCache();
        showToast('Privacy policy saved!', 'success');
      } catch (e) {
        showToast(e.message || 'Failed to save', 'error');
      }
    }

    loadContent();
  </script>
