          <div class="card-body">
            <div class="form-group" style="margin:0;">

        </div>

        <!-- Our Story -->
        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-book-open" style="margin-right:6px;color:var(--gold-dark);"></i> Our Story</h3>
          </div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group">
                <label class="section-label-admin">Section Label <small style="font-weight:400;color:var(--text-light);">small text above the heading</small></label>
                <input type="text" id="about_who_label" class="form-control" placeholder="Who We Are" />
              </div>
              <div class="form-group">
                <label class="section-label-admin">Section Heading</label>
                <input type="text" id="about_section_title" class="form-control" placeholder="The Art of Refined Gifting" />
              </div>
            </div>
            <div class="form-group">
              <label class="section-label-admin">Paragraph 1</label>
              <textarea id="about_story_p1" class="form-control" rows="3" placeholder="Aura Gifts was born from a simple belief…"></textarea>
            </div>
            <div class="form-group">
              <label class="section-label-admin">Paragraph 2</label>
              <textarea id="about_story_p2" class="form-control" rows="3" placeholder="Every hamper we create tells a story…"></textarea>
            </div>
            <div class="form-group" style="margin:0;">
              <label class="section-label-admin">Paragraph 3</label>
              <textarea id="about_story_p3" class="form-control" rows="3" placeholder="We work with individuals and businesses…"></textarea>
            </div>
          </div>
        </div>

        <!-- CTA -->
        <div class="card">
          <div class="card-header">
            <h3><i class="fas fa-bullhorn" style="margin-right:6px;color:var(--gold-dark);"></i> Call to Action</h3>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="section-label-admin">CTA Title</label>
              <input type="text" id="about_cta_title" class="form-control" placeholder="Ready to Send Something Special?" />
            </div>
            <div class="form-group" style="margin:0;">
              <label class="section-label-admin">CTA Subtitle</label>
              <input type="text" id="about_cta_subtitle" class="form-control" placeholder="Browse our collection or reach out for a personalised or corporate order." />
            </div>
          </div>
        </div>

  <div id="toast" class="toast"></div>
  <script src="/admin/static/admin.js?v=1"></script>
  <script>window.scrollTo(0, 0);</script>
  <script>
    requireAuth();

    const ALL_KEYS = [
      'about_hero_subtitle',
      'about_who_label', 'about_section_title',
      'about_story_p1', 'about_story_p2', 'about_story_p3',
      'about_cta_title', 'about_cta_subtitle'
    ];

    async function loadContent() {
      try {
        const items = await api('/api/admin/content');
        items.forEach(item => {
          const el = document.getElementById(item.key);
          if (el) el.value = item.value || '';
        });
      } catch (e) {
        showToast('Failed to load content', 'error');
      }
    }

    async function saveAll() {
      const payload = ALL_KEYS.map(key => {
        const el = document.getElementById(key);
        return { key, value: el ? el.value.trim() : '', content_type: 'text' };
      });
      try {
        await api('/api/admin/content', 'PUT', payload);
        invalidateFrontendCache();
        showToast('About Us saved!', 'success');
      } catch (e) {
        showToast(e.message || 'Failed to save', 'error');
      }
    }

    loadContent();
  </script>
