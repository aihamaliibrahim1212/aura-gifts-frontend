<!DOCTYPE html>
<html lang="en">
<head>
    <style>*{box-sizing:border-box;margin:0;padding:0}html{background:#fff;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:16px;line-height:1.6;color:#1a1a1a;overflow-x:hidden}body{background:#fff;overflow-x:hidden}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password · Aura Gifts</title>
    <link rel="icon" href="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717074/aura-gifts/logos/hky5k3sgrupvx5jtxqrh.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css?v=20">
    <link rel="stylesheet" href="../css/auth.css?v=12">
    <script src="../js/auth.js?v=10" defer></script>
</head>
<body>

    <header id="header">
        <div class="top-bar" id="top-bar-text">FOR QUERIES PLEASE CALL 9992070</div>
        <div class="header-search-bar">
            <a href="../index.html" class="logo">
                <img src="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717076/aura-gifts/logos/tdpoqlfhze5zkuvdppgw.jpg" alt="Aura Gifts" class="logo-wide" id="site-logo-wide">
            </a>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">

            <div class="auth-logo">
                <a href="../index.html">
                    <img src="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717076/aura-gifts/logos/tdpoqlfhze5zkuvdppgw.jpg" alt="Aura Gifts" style="height:36px;width:auto;">
                </a>
            </div>

            <div id="form-view">
                <h1 class="auth-title">Forgot your password?</h1>
                <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

                <div class="auth-error" id="auth-error" role="alert" style="display:none;"></div>

                <form id="forgot-form" novalidate>
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" name="email" placeholder="you@example.com"
                                   autocomplete="email" required maxlength="200">
                        </div>
                        <div class="field-error" id="email-error"></div>
                    </div>

                    <button type="submit" class="auth-submit" id="forgot-btn">
                        <span class="btn-text">Send Reset Link</span>
                        <span class="btn-spinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
                    </button>
                </form>

                <p class="auth-switch">
                    <a href="login.html" class="auth-link"><i class="fas fa-arrow-left" style="font-size:0.8rem;margin-right:4px;"></i> Back to Sign In</a>
                </p>
            </div>

            <!-- Success state -->
            <div id="success-view" style="display:none; text-align:center;">
                <div style="width:64px;height:64px;border-radius:50%;background:var(--gold-pale);border:1.5px solid var(--border-gray);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;color:var(--gold-dark);">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <h1 class="auth-title" style="font-size:1.5rem;">Check your email</h1>
                <p class="auth-subtitle" id="success-msg" style="margin-bottom:28px;">If an account exists for that email, a reset link has been sent. Check your inbox (and spam folder).</p>
                <a href="login.html" class="auth-submit" style="display:block;text-align:center;text-decoration:none;">Back to Sign In</a>
            </div>

        </div>
    </main>

    <script src="../js/api-cache.js?v=19"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const errEl = document.getElementById('auth-error');

            document.getElementById('email-error').style.display = 'none';
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                const err = document.getElementById('email-error');
                err.textContent = 'Please enter a valid email address.';
                err.style.display = 'block';
                return;
            }

            authClearError(errEl);
            const btn = document.getElementById('forgot-btn');
            btn.disabled = true;
            btn.querySelector('.btn-text').style.display    = 'none';
            btn.querySelector('.btn-spinner').style.display = 'inline';

            try {
                const apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
                const res = await fetch(apiBase + '/api/user/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                // Always show success view (prevents email enumeration)
                document.getElementById('form-view').style.display    = 'none';
                document.getElementById('success-view').style.display = 'block';
            } catch (err) {
                authShowError(errEl, 'Could not connect. Please try again later.');
                btn.disabled = false;
                btn.querySelector('.btn-text').style.display    = 'inline';
                btn.querySelector('.btn-spinner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
