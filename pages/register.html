<!DOCTYPE html>
<html lang="en">
<head>
    <style>*{box-sizing:border-box;margin:0;padding:0}html,body{background:#f5f1eb;font-family:Inter,sans-serif;color:#1a1a1a;overflow-x:hidden;min-height:100vh}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account · Aura Gifts</title>
    <link rel="icon" href="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717074/aura-gifts/logos/hky5k3sgrupvx5jtxqrh.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../css/auth.css?v=16">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
            background: var(--gold-pale, #f5f1eb);
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.10);
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo { margin-bottom: 28px; }
        .login-logo img { height: 40px; width: auto; }
        .login-divider {
            width: 40px; height: 2px;
            background: #b8a898;
            margin: 20px auto 24px;
            border-radius: 2px;
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem; font-weight: 600;
            color: #1a1a1a; margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 1rem;
            font-weight: 500;
            color: #b8a898;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
            font-family: 'Avenir Next', 'Avenir', 'Nunito', sans-serif;
        }
        .login-google-wrap { display: block; width: 340px; max-width: 100%; margin: 0 auto 20px; min-height: 44px; }
        .login-error {
            background: #fce4e4; border: 1.5px solid #f5c6c6;
            border-radius: 8px; padding: 10px 14px;
            font-size: 0.85rem; color: #c62828;
            margin-bottom: 16px; display: none; text-align: left;
        }
        .login-terms { font-size: 0.78rem; color: #9a9a9a; line-height: 1.6; margin-top: 4px; }
        .login-terms a { color: #b8a898; text-decoration: none; border-bottom: 1px solid #b8a898; }
        .login-terms a:hover { color: #1a1a1a; border-color: #1a1a1a; }
        .login-back {
            display: inline-block;
            margin-top: 28px; font-size: 0.82rem; color: #b8a898;
            text-decoration: none; letter-spacing: 0.3px; transition: color 0.2s;
            border-bottom: 1px solid transparent;
        }
        .login-back:hover { color: #1a1a1a; border-bottom-color: #1a1a1a; }
        @media (max-width: 480px) { .login-card { padding: 36px 24px 32px; } }
    </style>
</head>
<body>

    <div class="login-card">

        <div class="login-logo">
            <a href="../index.html">
                <img src="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717076/aura-gifts/logos/tdpoqlfhze5zkuvdppgw.jpg" alt="Aura Gifts">
            </a>
        </div>

        <div class="login-divider"></div>

        <h1 class="login-title">Sign up</h1>
        <p class="login-subtitle">Aura Gifts</p>

        <div class="login-error" id="auth-error" role="alert"></div>

        <div id="google-signin-btn" class="login-google-wrap"></div>

        <p class="login-terms">
            By creating an account you agree to our
            <a href="terms.html">Terms of Service</a> and
            <a href="privacy.html">Privacy Policy</a>.
        </p>

        <a href="../index.html" class="login-back">← &nbsp;Back to store</a>

    </div>

    <script src="../js/api-cache.js?v=23"></script>
    <script src="../js/auth.js?v=14" defer></script>
    <script>
        const GOOGLE_CLIENT_ID = '978981763744-u2srh7sj42kiedj7h3cnlnt52mcaq620.apps.googleusercontent.com';

        function googleOnLoad() {
            if (!window.google || !window.google.accounts) return;
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: function(response) {
                    var errEl = document.getElementById('auth-error');
                    errEl.style.display = 'none';

                    var attempts = 0;
                    function tryAuth() {
                        attempts++;
                        var apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
                        fetch(apiBase + '/api/user/google', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({ id_token: response.credential, remember: true })
                        })
                        .then(function(r) { return r.json(); })
                        .then(function(json) {
                            if (json.success) {
                                localStorage.setItem('aura_user_token', json.data.token);
                                localStorage.setItem('aura_user', JSON.stringify(json.data.user));
                                // If delivery details not set yet, show completion modal
                                var u = json.data.user;
                                if (!u.phone || !u.island) {
                                    showProfileModal(u);
                                } else {
                                    window.location.href = 'account.html';
                                }
                            } else {
                                errEl.textContent = json.error || 'Sign-in failed. Please try again.';
                                errEl.style.display = 'block';
                            }
                        })
                        .catch(function() {
                            if (attempts < 2) {
                                setTimeout(tryAuth, 800);
                            } else {
                                errEl.textContent = 'Could not connect. Please try again.';
                                errEl.style.display = 'block';
                            }
                        });
                    }
                    tryAuth();
                },
                auto_select: false,
                cancel_on_tap_outside: true,
            });
            setTimeout(function() {
                var container = document.getElementById('google-signin-btn');
                if (container) {
                    google.accounts.id.renderButton(container,
                        { theme: 'outline', size: 'large', width: 340, text: 'continue_with', shape: 'rectangular', logo_alignment: 'left' }
                    );
                }
                google.accounts.id.prompt();
            }, 200);
        }
        window.onload = function() { if (typeof google !== 'undefined') googleOnLoad(); };
        window.googleOnLoad = googleOnLoad;

        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('aura_user_token')) {
                var u = null;
                try { u = JSON.parse(localStorage.getItem('aura_user')); } catch(e) {}
                if (u && (!u.phone || !u.island)) {
                    showProfileModal(u);
                } else {
                    window.location.href = 'account.html';
                }
            }
        });

        function showProfileModal(user) {
            var inp = function(id, ph, type) {
                return '<div style="margin-bottom:12px;">' +
                    '<input id="pm-' + id + '" type="' + (type||'text') + '" placeholder="' + ph + '" maxlength="200" style="' +
                    'width:100%;padding:10px 14px;border:1.5px solid #e0d8cc;border-radius:8px;font-size:0.9rem;' +
                    'outline:none;box-sizing:border-box;font-family:inherit;" ' +
                    'onfocus="this.style.borderColor=\'#b8a898\'" onblur="this.style.borderColor=\'#e0d8cc\'">' +
                    '</div>';
            };
            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;padding:16px;';
            overlay.innerHTML =
                '<div style="background:#fff;border-radius:20px;padding:36px 32px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.18);max-height:90vh;overflow-y:auto;">' +
                    '<div style="text-align:center;margin-bottom:24px;">' +
                        '<div style="width:52px;height:52px;background:#f5f1eb;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">' +
                            '<i class="fas fa-map-marker-alt" style="color:#b8a898;font-size:1.3rem;"></i>' +
                        '</div>' +
                        '<h2 style="margin:0 0 6px;font-family:\'Playfair Display\',serif;font-size:1.4rem;">Complete your profile</h2>' +
                        '<p style="margin:0;font-size:0.85rem;color:#999;">Add your delivery details so we know where to send your order.</p>' +
                    '</div>' +
                    '<div id="pm-error" style="display:none;background:#fce4e4;border:1.5px solid #f5c6c6;border-radius:8px;padding:9px 12px;font-size:0.83rem;color:#c62828;margin-bottom:14px;"></div>' +
                    inp('phone',       'Phone number *', 'tel') +
                    '<input id="pm-island" type="text" placeholder="Island *" maxlength="100" style="width:100%;padding:10px 14px;border:1.5px solid #e0d8cc;border-radius:8px;font-size:0.9rem;outline:none;box-sizing:border-box;font-family:inherit;margin-bottom:12px;" onfocus="this.style.borderColor=\'#b8a898\'" onblur="this.style.borderColor=\'#e0d8cc\'">' +
                    inp('address',     'Address / flat number *') +
                    '<p style="font-size:0.78rem;color:#b8a898;font-weight:600;margin:8px 0 10px;"><i class="fas fa-ship" style="margin-right:4px;"></i>Boat details <span style="font-weight:400;">leave empty if not ordering via boat</span></p>' +
                    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">' +
                        '<input id="pm-boat-name" type="text" placeholder="Boat name" maxlength="100" style="padding:10px 14px;border:1.5px solid #e0d8cc;border-radius:8px;font-size:0.9rem;outline:none;box-sizing:border-box;font-family:inherit;" onfocus="this.style.borderColor=\'#b8a898\'" onblur="this.style.borderColor=\'#e0d8cc\'">' +
                        '<input id="pm-boat-number" type="text" placeholder="Reg. number" maxlength="50" style="padding:10px 14px;border:1.5px solid #e0d8cc;border-radius:8px;font-size:0.9rem;outline:none;box-sizing:border-box;font-family:inherit;" onfocus="this.style.borderColor=\'#b8a898\'" onblur="this.style.borderColor=\'#e0d8cc\'">' +
                    '</div>' +
                    '<button id="pm-save-btn" onclick="saveProfileModal()" style="width:100%;padding:13px;background:#b8a898;color:#fff;border:none;border-radius:10px;font-size:0.95rem;font-weight:600;cursor:pointer;">Save &amp; Continue</button>' +
                    '<button onclick="window.location.href=\'account.html\'" style="width:100%;padding:10px;background:none;border:none;font-size:0.82rem;color:#b8a898;cursor:pointer;margin-top:8px;">Skip for now</button>' +
                '</div>';
            document.body.appendChild(overlay);
        }

        async function saveProfileModal() {
            var phone      = document.getElementById('pm-phone').value.trim();
            var island     = document.getElementById('pm-island').value.trim();
            var address    = document.getElementById('pm-address').value.trim();
            var boatName   = document.getElementById('pm-boat-name').value.trim();
            var boatNumber = document.getElementById('pm-boat-number').value.trim();
            var errEl      = document.getElementById('pm-error');
            var btn        = document.getElementById('pm-save-btn');

            errEl.style.display = 'none';
            if (!phone)  { errEl.textContent = 'Phone number is required.';  errEl.style.display = 'block'; return; }
            if (!island) { errEl.textContent = 'Island is required.'; errEl.style.display = 'block'; return; }
            if (!address) { errEl.textContent = 'Address is required.'; errEl.style.display = 'block'; return; }

            btn.disabled = true; btn.textContent = 'Saving…';

            try {
                var apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
                var token = localStorage.getItem('aura_user_token');
                var res = await fetch(apiBase + '/api/user/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ phone: phone, island: island, address: address, boat_name: boatName, boat_number: boatNumber })
                });
                var json = await res.json();
                if (json.success) {
                    localStorage.setItem('aura_user', JSON.stringify(json.data));
                    window.location.href = 'account.html';
                } else {
                    errEl.textContent = json.error || 'Could not save. Please try again.';
                    errEl.style.display = 'block';
                    btn.disabled = false; btn.textContent = 'Save & Continue';
                }
            } catch(e) {
                errEl.textContent = 'Could not connect. Please try again.';
                errEl.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Save & Continue';
            }
        }
    </script>
    <script src="https://accounts.google.com/gsi/client?onload=googleOnLoad" async defer></script>
</body>
</html>
