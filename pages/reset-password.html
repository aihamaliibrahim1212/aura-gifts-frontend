<!DOCTYPE html>
<html lang="en">
<head>
    <style>*{box-sizing:border-box;margin:0;padding:0}html{background:#fff;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:16px;line-height:1.6;color:#1a1a1a;overflow-x:hidden}body{background:#fff;overflow-x:hidden}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password · Aura Gifts</title>
    <link rel="icon" href="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717074/aura-gifts/logos/hky5k3sgrupvx5jtxqrh.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css?v=20">
    <link rel="stylesheet" href="../css/auth.css?v=12">
    <script src="../js/auth.js?v=10" defer></script>
</head>
<body>

    <header id="header">
        <div class="top-bar" id="top-bar-text">FOR QUERIES PLEASE CALL 9992070</div>
        <div class="header-search-bar">
            <a href="../index.html" class="logo">
                <img src="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717076/aura-gifts/logos/tdpoqlfhze5zkuvdppgw.jpg" alt="Aura Gifts" class="logo-wide" id="site-logo-wide">
            </a>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">

            <div class="auth-logo">
                <a href="../index.html">
                    <img src="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717076/aura-gifts/logos/tdpoqlfhze5zkuvdppgw.jpg" alt="Aura Gifts" style="height:36px;width:auto;">
                </a>
            </div>

            <div id="form-view">
                <h1 class="auth-title">Create new password</h1>
                <p class="auth-subtitle">Choose a strong password for your account.</p>

                <div class="auth-error" id="auth-error" role="alert" style="display:none;"></div>

                <form id="reset-form" novalidate>
                    <div class="form-group">
                        <label for="password">New password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" name="password"
                                   placeholder="At least 8 characters"
                                   autocomplete="new-password" required maxlength="255">
                            <button type="button" class="password-toggle" onclick="togglePwVisibility('password', this)" aria-label="Show password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="password-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm new password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="confirm-password" name="confirm_password"
                                   placeholder="Repeat new password"
                                   autocomplete="new-password" required maxlength="255">
                            <button type="button" class="password-toggle" onclick="togglePwVisibility('confirm-password', this)" aria-label="Show password">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="confirm-error"></div>
                    </div>

                    <button type="submit" class="auth-submit" id="reset-btn">
                        <span class="btn-text">Reset Password</span>
                        <span class="btn-spinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
                    </button>
                </form>
            </div>

            <!-- Invalid token state -->
            <div id="invalid-view" style="display:none;text-align:center;">
                <div style="width:64px;height:64px;border-radius:50%;background:#fce4e4;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;color:#c62828;">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h1 class="auth-title" style="font-size:1.4rem;">Link expired or invalid</h1>
                <p class="auth-subtitle" style="margin-bottom:28px;">This reset link has expired or already been used. Please request a new one.</p>
                <a href="forgot-password.html" class="auth-submit" style="display:block;text-align:center;text-decoration:none;">Request New Link</a>
            </div>

            <!-- Success state -->
            <div id="success-view" style="display:none;text-align:center;">
                <div style="width:64px;height:64px;border-radius:50%;background:var(--gold-pale);border:1.5px solid var(--border-gray);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;color:var(--gold-dark);">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1 class="auth-title" style="font-size:1.5rem;">Password updated</h1>
                <p class="auth-subtitle" style="margin-bottom:28px;">Your password has been reset successfully.</p>
                <a href="login.html" class="auth-submit" style="display:block;text-align:center;text-decoration:none;">Sign In</a>
            </div>

        </div>
    </main>

    <script src="../js/api-cache.js?v=19"></script>
    <script>
        // Extract token from URL
        const params = new URLSearchParams(window.location.search);
        const resetToken = params.get('token');

        if (!resetToken) {
            document.getElementById('form-view').style.display    = 'none';
            document.getElementById('invalid-view').style.display = 'block';
        }

        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirm-password').value;
            const errEl    = document.getElementById('auth-error');

            document.querySelectorAll('.field-error').forEach(el => { el.textContent = ''; el.style.display = 'none'; });
            authClearError(errEl);

            let valid = true;
            if (password.length < 8) {
                const err = document.getElementById('password-error');
                err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; valid = false;
            } else if (!/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                const err = document.getElementById('password-error');
                err.textContent = 'Password must have at least one uppercase letter and one number.'; err.style.display = 'block'; valid = false;
            }
            if (password !== confirm) {
                const err = document.getElementById('confirm-error');
                err.textContent = 'Passwords do not match.'; err.style.display = 'block'; valid = false;
            }
            if (!valid) return;

            const btn = document.getElementById('reset-btn');
            btn.disabled = true;
            btn.querySelector('.btn-text').style.display    = 'none';
            btn.querySelector('.btn-spinner').style.display = 'inline';

            try {
                const apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
                const res = await fetch(apiBase + '/api/user/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password }),
                });
                const json = await res.json();

                if (res.ok && json.success) {
                    document.getElementById('form-view').style.display    = 'none';
                    document.getElementById('success-view').style.display = 'block';
                } else if (res.status === 410) {
                    document.getElementById('form-view').style.display    = 'none';
                    document.getElementById('invalid-view').style.display = 'block';
                } else {
                    authShowError(errEl, json.error || 'Reset failed. Please try again.');
                    btn.disabled = false;
                    btn.querySelector('.btn-text').style.display    = 'inline';
                    btn.querySelector('.btn-spinner').style.display = 'none';
                }
            } catch (err) {
                authShowError(errEl, 'Could not connect. Please try again later.');
                btn.disabled = false;
                btn.querySelector('.btn-text').style.display    = 'inline';
                btn.querySelector('.btn-spinner').style.display = 'none';
            }
        });

        function togglePwVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon  = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text'; icon.className = 'fas fa-eye-slash';
                btn.setAttribute('aria-label', 'Hide password');
            } else {
                input.type = 'password'; icon.className = 'fas fa-eye';
                btn.setAttribute('aria-label', 'Show password');
            }
        }
    </script>
</body>
</html>
