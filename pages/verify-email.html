<!DOCTYPE html>
<html lang="en">
<head>
    <style>*{box-sizing:border-box;margin:0;padding:0}html{background:#fff;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:16px;line-height:1.6;color:#1a1a1a;overflow-x:hidden}body{background:#fff;overflow-x:hidden}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email · Aura Gifts</title>
    <link rel="icon" href="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717074/aura-gifts/logos/hky5k3sgrupvx5jtxqrh.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css?v=14">
    <link rel="stylesheet" href="../css/auth.css?v=6">
    <script src="../js/auth.js?v=4" defer></script>
</head>
<body>

    <header id="header">
        <div class="top-bar" id="top-bar-text">FOR QUERIES PLEASE CALL 9992070</div>
        <div class="header-search-bar">
            <a href="../index.html" class="logo">
                <img src="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717076/aura-gifts/logos/tdpoqlfhze5zkuvdppgw.jpg" alt="Aura Gifts" class="logo-wide" id="site-logo-wide">
            </a>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card" style="text-align:center;">

            <div class="auth-logo">
                <a href="../index.html">
                    <img src="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717076/aura-gifts/logos/tdpoqlfhze5zkuvdppgw.jpg" alt="Aura Gifts" style="height:36px;width:auto;">
                </a>
            </div>

            <div id="loading-view">
                <div style="font-size:2rem;margin:20px 0;color:var(--gold-dark);"><i class="fas fa-spinner fa-spin"></i></div>
                <p style="color:var(--text-mid);">Verifying your email…</p>
            </div>

            <div id="success-view" style="display:none;">
                <div style="width:64px;height:64px;border-radius:50%;background:var(--gold-pale);border:1.5px solid var(--border-gray);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;color:var(--gold-dark);">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1 class="auth-title" style="font-size:1.5rem;">Email verified!</h1>
                <p class="auth-subtitle" style="margin-bottom:28px;">Your email address has been verified. You can now enjoy all features of Aura Gifts.</p>
                <a href="account.html" class="auth-submit" style="display:block;text-align:center;text-decoration:none;">Go to My Account</a>
            </div>

            <div id="error-view" style="display:none;">
                <div style="width:64px;height:64px;border-radius:50%;background:#fce4e4;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.8rem;color:#c62828;">
                    <i class="fas fa-times-circle"></i>
                </div>
                <h1 class="auth-title" style="font-size:1.4rem;">Verification failed</h1>
                <p class="auth-subtitle" id="error-msg" style="margin-bottom:28px;">This link is invalid or has already been used.</p>
                <a href="login.html" class="auth-submit" style="display:block;text-align:center;text-decoration:none;">Go to Sign In</a>
            </div>

        </div>
    </main>

    <script src="../js/api-cache.js?v=13"></script>
    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const token  = params.get('token');

            if (!token) {
                document.getElementById('loading-view').style.display = 'none';
                document.getElementById('error-view').style.display   = 'block';
                return;
            }

            try {
                const apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
                const res  = await fetch(apiBase + '/api/user/verify-email?token=' + encodeURIComponent(token), {
                    headers: { 'Accept': 'application/json' },
                });
                const json = await res.json();

                document.getElementById('loading-view').style.display = 'none';

                if (res.ok && json.success) {
                    document.getElementById('success-view').style.display = 'block';
                    // Update stored user if logged in
                    const user = authGetUser();
                    if (user) {
                        user.email_verified = true;
                        authSetSession(authGetToken(), user);
                    }
                } else {
                    document.getElementById('error-msg').textContent = json.error || 'This link is invalid or has already been used.';
                    document.getElementById('error-view').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('loading-view').style.display = 'none';
                document.getElementById('error-msg').textContent = 'Could not connect. Please try again later.';
                document.getElementById('error-view').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
