<!DOCTYPE html>
<html lang="en">
<head>
    <style>*{box-sizing:border-box;margin:0;padding:0}html,body{background:#f5f1eb;font-family:Inter,sans-serif;color:#1a1a1a;overflow-x:hidden;min-height:100vh}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In · Aura Gifts</title>
    <link rel="icon" href="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717074/aura-gifts/logos/hky5k3sgrupvx5jtxqrh.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;600;700&display=swap" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../css/auth.css?v=11">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px 16px;
            background: var(--gold-pale, #f5f1eb);
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.10);
            padding: 48px 40px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            margin-bottom: 28px;
        }
        .login-logo img {
            height: 40px;
            width: auto;
        }
        .login-divider {
            width: 40px;
            height: 2px;
            background: var(--gold-dark, #b8a898);
            margin: 20px auto 24px;
            border-radius: 2px;
        }
        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 1rem;
            font-weight: 500;
            color: #b8a898;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
            font-family: 'Avenir Next', 'Avenir', 'Nunito', sans-serif;
        }
        .login-google-wrap {
            display: flex;
            justify-content: center;
            width: 100%;
            margin: 0 auto 20px;
            min-height: 44px;
        }
        /* Force Google's injected iframe to center */
        .login-google-wrap > div { margin: 0 auto !important; }
        .login-google-wrap iframe { display: block !important; margin: 0 auto !important; }
        .login-error {
            background: #fce4e4;
            border: 1.5px solid #f5c6c6;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #c62828;
            margin-bottom: 16px;
            display: none;
            text-align: left;
        }
        .login-terms {
            font-size: 0.78rem;
            color: #9a9a9a;
            line-height: 1.6;
            margin-top: 4px;
        }
        .login-terms a {
            color: #b8a898;
            text-decoration: none;
            border-bottom: 1px solid #b8a898;
        }
        .login-terms a:hover { color: #1a1a1a; border-color: #1a1a1a; }
        .login-back {
            display: inline-block;
            margin-top: 28px;
            font-size: 0.82rem;
            color: #b8a898;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: color 0.2s;
            border-bottom: 1px solid transparent;
        }
        .login-back:hover {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }
        @media (max-width: 480px) {
            .login-card { padding: 36px 24px 32px; }
        }
    </style>
</head>
<body>

    <div class="login-card">

        <div class="login-logo">
            <a href="../index.html">
                <img src="https://res.cloudinary.com/dat7p3xuv/image/upload/v1780717076/aura-gifts/logos/tdpoqlfhze5zkuvdppgw.jpg" alt="Aura Gifts">
            </a>
        </div>

        <div class="login-divider"></div>

        <h1 class="login-title" id="login-title">Sign in</h1>
        <p class="login-subtitle">Aura Gifts</p>

        <div class="login-error" id="auth-error" role="alert"></div>

        <div id="google-signin-btn" class="login-google-wrap"></div>

        <p class="login-terms">
            By signing in you agree to our
            <a href="terms.html">Terms of Service</a> and
            <a href="privacy.html">Privacy Policy</a>.
        </p>

        <a href="../index.html" class="login-back">← &nbsp;Back to store</a>

    </div>

    <script src="../js/api-cache.js?v=18"></script>
    <script src="../js/auth.js?v=9" defer></script>
    <script>
        const GOOGLE_CLIENT_ID = '978981763744-u2srh7sj42kiedj7h3cnlnt52mcaq620.apps.googleusercontent.com';

        function googleOnLoad() {
            if (!window.google || !window.google.accounts) return;
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: function(response) {
                    var errEl = document.getElementById('auth-error');
                    errEl.style.display = 'none';

                    // Retry up to 2 times on network errors
                    var attempts = 0;
                    function tryAuth() {
                        attempts++;
                        var apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
                        fetch(apiBase + '/api/user/google', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                            credentials: 'include',
                            body: JSON.stringify({ id_token: response.credential, remember: true })
                        })
                        .then(function(r) { return r.json(); })
                        .then(function(json) {
                            if (json.success) {
                                var token = json.data.token;
                                localStorage.setItem('aura_user_token', token);
                                localStorage.setItem('aura_user', JSON.stringify(json.data.user));
                                // Fetch fresh user data so avatar_url is up-to-date after background Cloudinary upload
                                var apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
                                fetch(apiBase + '/api/user/me', {
                                    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
                                }).then(function(r) { return r.json(); }).then(function(me) {
                                    if (me.success && me.data) {
                                        localStorage.setItem('aura_user', JSON.stringify(me.data));
                                    }
                                }).catch(function() {}).finally(function() {
                                    var params = new URLSearchParams(window.location.search);
                                    window.location.href = params.get('redirect') || 'account.html';
                                });
                            } else {
                                errEl.textContent = json.error || 'Sign-in failed. Please try again.';
                                errEl.style.display = 'block';
                            }
                        })
                        .catch(function() {
                            if (attempts < 2) {
                                setTimeout(tryAuth, 800);
                            } else {
                                errEl.textContent = 'Could not connect. Please try again.';
                                errEl.style.display = 'block';
                            }
                        });
                    }
                    tryAuth();
                },
                auto_select: false,
                cancel_on_tap_outside: true,
            });
            // Render button and prompt together after a short delay
            // so initialize() has fully settled before anything fires
            setTimeout(function() {
                var container = document.getElementById('google-signin-btn');
                if (container) {
                    google.accounts.id.renderButton(container,
                        { theme: 'outline', size: 'large', width: 340, text: 'continue_with', shape: 'rectangular', logo_alignment: 'left' }
                    );
                }
                google.accounts.id.prompt();
            }, 200);
        }
        window.onload = function() { if (typeof google !== 'undefined') googleOnLoad(); };
        window.googleOnLoad = googleOnLoad;

        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(window.location.search);
            if (localStorage.getItem('aura_user_token')) {
                window.location.href = params.get('redirect') || 'account.html';
            }
        });
    </script>
    <script src="https://accounts.google.com/gsi/client?onload=googleOnLoad" async defer></script>
</body>
</html>
